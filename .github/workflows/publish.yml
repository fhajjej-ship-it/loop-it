name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm run check
      - name: Resolve package version
        id: package
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Package version: $version"
      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          expected="v${{ steps.package.outputs.version }}"
          actual="${{ github.event.release.tag_name }}"
          if [ "$actual" != "$expected" ]; then
            echo "Release tag $actual does not match package version $expected" >&2
            exit 1
          fi
      - name: Check npm version
        id: npm
        run: |
          if npm view "@fhajjej/loop-it@${{ steps.package.outputs.version }}" version >/tmp/loop-it-npm-version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version already published: $(cat /tmp/loop-it-npm-version)"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version is not published yet."
          fi
      - name: Publish to npm
        if: steps.npm.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
